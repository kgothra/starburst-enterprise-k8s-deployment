# Source: starburst-enterprise/templates/initfile/init-file-secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: init-secret-sep-starburst-enterprise
stringData:
  initFile: | 
    #!/bin/bash
    set -euxo pipefail
    
    # security override file for Aurora DH keys
    cat <<EOF > /tmp/java.security.override
    jdk.tls.disabledAlgorithms=SSLv3, TLSv1, TLSv1.1, RC4, DES, MD5withRSA, DH keySize < 1024, EC keySize <224, anon, NULL, include jdk.disabled.namedCurves
    EOF
    
    if [ "${1:-}" == "coordinator" ]; then
    fi
    echo "Starting starburst"
    exec /usr/lib/starburst/bin/run-starburst
    

